{{ define "main" }}

<section class="relative border border-gray-200 bg-[#070709] rounded-sm p-8 md:p-12 text-gray-300">

  <!-- Heading -->
  <h1 class="text-2xl sm:text-3xl md:text-4xl font-semibold text-blue-200 mb-6 tracking-wide">
    cat "welcome.txt"
  </h1>

  <!-- Content -->
  <div class="space-y-6 sm:text-lg md:text-xl lg:text-2xl leading-relaxed">
    <span id="typewriter"></span><span id="cursor" class="text-blue-200">█</span>
  </div>

</section>

<script>
  function startTypewriter() {
    const el = document.getElementById("typewriter");
    const cursor = document.getElementById("cursor");
    
    if (!el) return;
    
    el.textContent = "";
    cursor.style.animation = "";
    
    const lines = [
      { text: "Documenting the grind — CTF writeups, home lab builds, and security projects by Esteban Pangelinan.", pause: 600 },
      { text: "CREDENTIALS: UW Informatics '27, Security+ SY0-701 Certified, IT Technician at UW's Applied Physics Lab.", pause: 300 },
      { text: "Actively building toward a cybersecurity career.", pause: 0 },
    ];

    let lineIndex = 0;
    let charIndex = 0;

    function type() {
      if (lineIndex < lines.length) {
        const current = lines[lineIndex];
        if (charIndex < current.text.length) {
          el.innerHTML += current.text.charAt(charIndex);
          charIndex++;
          setTimeout(type, 25);
        } else {
          if (lineIndex < lines.length - 1) {
            el.innerHTML += "<br><br>";
          }
          lineIndex++;
          charIndex = 0;
          setTimeout(type, current.pause);
        }
      } else {
        cursor.style.animation = "blink 1s step-end infinite";
      }
    }

    type();
  }

// runs on hard load
  window.addEventListener("pageshow", startTypewriter);

  // runs on swup transition
  document.addEventListener("swup:page:view", startTypewriter);
</script>

<style>
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>

{{ end }}
